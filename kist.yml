# =============================================================================
# boot.gl - Production Build Configuration
# =============================================================================

---

options:
    mode: production
    logLevel: info

# =============================================================================
# Stages
# =============================================================================

stages:

    - name: Build
      description: "Production build for boot.gl (CSS reset library)"

      steps:

            # Clean dist directory
            # -----------------------------------------------------------------
            - name: CleanDistDirectory
              action: DirectoryCleanAction
              options:
                  dirPath: "./dist"

            # Process SCSS to CSS (compressed)
            # -----------------------------------------------------------------
            - name: ProcessMainStylesMinified
              action: StyleProcessingAction
              options:
                  inputFile: "./src/scss/index.scss"
                  outputFile: "./dist/css/boot.gl.min.css"
                  styleOption: "compressed"

            # Process SCSS to CSS (expanded)
            # -----------------------------------------------------------------
            - name: ProcessMainStylesExpanded
              action: StyleProcessingAction
              options:
                  inputFile: "./src/scss/index.scss"
                  outputFile: "./dist/css/boot.gl.css"
                  styleOption: "expanded"

            # Copy source SCSS files
            # -----------------------------------------------------------------
            - name: CopySrcSCSS
              action: DirectoryCopyAction
              options:
                  srcDir: "./src/scss"
                  destDir: "./dist/scss"

            # Copy license and readme
            # -----------------------------------------------------------------
            - name: CopyLICENSE
              action: FileCopyAction
              options:
                  srcFile: "./LICENSE"
                  destDir: "./dist"

            - name: CopyREADME
              action: FileCopyAction
              options:
                  srcFile: "./README.md"
                  destDir: "./dist"

            # Generate package.json for distribution
            # -----------------------------------------------------------------
            - name: GeneratePackageJSON
              action: PackageManagerAction
              options:
                  packageJsonPath: "./package.json"
                  outputDir: "./dist"
                  fields:
                      - name
                      - version
                      - description
                      - keywords
                      - license
                      - homepage
                      - author
                      - contributors
                      - repository
                      - funding
                      - sass
                      - style
                      - exports
                      - files

            # Version synchronization
            # -----------------------------------------------------------------
            - name: SyncVersion
              action: VersionWriteAction
              options:
                  files:
                      - path: "./CITATION.cff"
                        key: "version: "
                      - path: "./VERSION"
                        key: "v"
